<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reasoning RAG · Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0d1117;
    --surface:    #161b22;
    --surface-2:  #1c2128;
    --border:     #21262d;
    --border-2:   #2a3040;
    --text-1:     #e6edf3;
    --text-2:     #8b949e;
    --text-3:     #484f58;
    --accent:     #4493f8;
    --accent-dim: #1b3558;
    --green:      #3fb950;
    --green-dim:  #1a3824;
    --teal:       #39c5cf;
    --teal-dim:   #112830;
    --red-dim:    #3a1a1a;
    --red:        #c07070;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-1);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ──────────────────────────────────────────── */
  .header {
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }
  .header-logo {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, #1e4a6e 0%, #0f2a42 100%);
    border: 1px solid #264a6e;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .header-info { flex: 1; }
  .header-title { font-size: 14px; font-weight: 600; color: var(--text-1); }
  .header-sub   { font-size: 11px; color: var(--text-3); margin-top: 1px; }
  .status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-3); }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px #3fb95055;
    animation: pulse 2.4s ease-in-out infinite;
  }
  .status-dot.busy { background: #c09030; box-shadow: 0 0 8px #c0903055; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Chat area ────────────────────────────────────────── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 5px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

  /* ── Welcome state ────────────────────────────────────── */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding-bottom: 60px;
    animation: fadeIn .4s ease;
  }
  .welcome-icon  { font-size: 42px; line-height: 1; filter: drop-shadow(0 0 18px #1e4a6e88); }
  .welcome-title { font-size: 22px; font-weight: 600; color: var(--text-1); }
  .welcome-sub   { font-size: 13px; color: var(--text-3); margin-bottom: 8px; }
  .hint-grid { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 520px; }
  .hint-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 16px;
    color: var(--text-3);
    font-size: 12.5px;
    font-family: inherit;
    text-align: left;
    cursor: pointer;
    transition: border-color .2s, color .2s;
    line-height: 1.5;
  }
  .hint-btn:hover { border-color: var(--border-2); color: var(--text-2); }

  /* ── Thread ───────────────────────────────────────────── */
  .thread {
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* ── User bubble ──────────────────────────────────────── */
  .user-row {
    display: flex;
    justify-content: flex-end;
    align-items: flex-start;
    gap: 10px;
  }
  .user-bubble {
    background: var(--surface-2);
    border: 1px solid var(--border-2);
    border-radius: 18px 4px 18px 18px;
    padding: 12px 18px;
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-1);
    max-width: 580px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    flex-shrink: 0; margin-top: 2px;
  }
  .avatar-user { background: #1e2a3e; border: 1px solid #2d3d55; color: #5a88b0; }
  .avatar-ai   { background: linear-gradient(135deg, #1a3a58, #0f2236); border: 1px solid #264a6e; color: var(--accent); }

  /* ── AI card ──────────────────────────────────────────── */
  .ai-row { display: flex; align-items: flex-start; gap: 10px; }
  .ai-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px 18px 18px 18px;
    overflow: hidden;
  }
  @keyframes fadeUp  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
  .ai-card.appeared  { animation: fadeUp .35s ease both; }

  /* ── Thinking dots ────────────────────────────────────── */
  .thinking-wrap { padding: 20px 24px; display: flex; align-items: center; gap: 5px; }
  .thinking-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-3);
    animation: blink 1.2s ease-in-out infinite;
  }
  .thinking-dot:nth-child(2) { animation-delay: .2s; }
  .thinking-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  /* ── Answer block ─────────────────────────────────────── */
  .answer-block { padding: 22px 24px 20px; }
  .answer-meta  { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .answer-label {
    font-size: 10px; font-weight: 600;
    color: var(--accent); text-transform: uppercase; letter-spacing: .1em;
  }
  .conf-badge {
    padding: 2px 10px;
    background: var(--green-dim); border: 1px solid #2a5a3a;
    border-radius: 20px; font-size: 10px; color: var(--green); font-weight: 500;
  }
  .answer-text { font-size: 15px; line-height: 1.85; color: var(--text-1); white-space: pre-wrap; word-break: break-word; }
  .answer-text em { color: #79b8ff; font-style: normal; font-weight: 500; }

  /* ── Error card ───────────────────────────────────────── */
  .error-block { padding: 20px 24px; }
  .error-label { font-size: 10px; font-weight: 600; color: var(--red); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }
  .error-text  { font-size: 13px; color: #c07070; font-family: 'JetBrains Mono', monospace; line-height: 1.6; word-break: break-all; }

  /* ── Divider ──────────────────────────────────────────── */
  .divider { height: 1px; background: var(--border); }

  /* ── Analysis toggle ──────────────────────────────────── */
  .analysis-block { padding: 14px 24px; }
  .toggle-btn {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; user-select: none;
    background: none; border: none; padding: 0;
  }
  .toggle-btn:hover .toggle-label { color: var(--text-2); }
  .toggle-label {
    font-size: 10.5px; color: var(--text-3);
    font-weight: 500; text-transform: uppercase; letter-spacing: .08em;
    transition: color .2s;
  }
  .toggle-chevron {
    color: var(--text-3); font-size: 9px;
    transition: transform .25s ease;
    display: inline-block;
  }
  .analysis-body { margin-top: 16px; display: none; flex-direction: column; gap: 12px; animation: fadeIn .2s ease; }
  .analysis-body.show { display: flex; }

  /* ── Stats grid ───────────────────────────────────────── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
  }
  .stat-card-title {
    font-size: 9.5px; color: var(--text-3);
    text-transform: uppercase; letter-spacing: .09em;
    font-weight: 600; margin-bottom: 9px;
  }
  .stat-row { display: flex; justify-content: space-between; align-items: baseline; padding: 3.5px 0; }
  .stat-k { font-size: 11.5px; color: var(--text-3); }
  .stat-v { font-size: 11.5px; color: var(--text-2); font-weight: 500; font-family: 'JetBrains Mono', monospace; }

  /* ── Reasoning path ───────────────────────────────────── */
  .path-card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
  }
  .section-title {
    font-size: 9.5px; color: var(--text-3);
    text-transform: uppercase; letter-spacing: .09em;
    font-weight: 600; margin-bottom: 12px;
  }
  .path-steps { display: flex; flex-direction: column; }
  .path-step  { display: flex; gap: 12px; }
  .step-col   { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .step-node  {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border-2);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600; color: var(--text-3);
    font-family: 'JetBrains Mono', monospace;
  }
  .step-connector { flex: 1; width: 1px; background: var(--border); min-height: 10px; }
  .step-content   { padding: 2px 0 14px; }
  .step-type { font-size: 9.5px; font-weight: 600; color: var(--teal); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 2px; }
  .step-desc { font-size: 12px; color: var(--text-3); line-height: 1.5; }

  /* ── Evidence ─────────────────────────────────────────── */
  .evidence-list { display: flex; flex-direction: column; gap: 8px; }
  .ev-item {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 14px;
    transition: border-color .2s;
  }
  .ev-item:hover { border-color: var(--border-2); }
  .ev-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-bottom: 7px; }
  .ev-rank { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-3); font-weight: 500; }
  .tag { padding: 1px 8px; border-radius: 4px; font-size: 9.5px; font-weight: 500; font-family: 'JetBrains Mono', monospace; }
  .tag-rel  { background: #152233; color: #4a8ab5; border: 1px solid #1e3a52; }
  .tag-sim  { background: #132520; color: #3a9080; border: 1px solid #1e3f38; }
  .tag-type { background: #1e1e10; color: #7a7a3a; border: 1px solid #38381a; }
  .ev-text  { font-size: 11.5px; color: var(--text-3); line-height: 1.6; font-style: italic; }

  /* ── Message footer ───────────────────────────────────── */
  .msg-footer { display: flex; gap: 8px; padding: 0 2px; margin-top: 6px; }
  .msg-footer span { font-size: 10px; color: var(--text-3); }

  /* ── Input area ───────────────────────────────────────── */
  .input-area {
    padding: 14px 24px 18px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-row { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  .input-wrap {
    flex: 1;
    background: var(--bg); border: 1px solid var(--border-2);
    border-radius: 13px; display: flex; align-items: flex-end;
    padding: 10px 14px; transition: border-color .2s;
  }
  .input-wrap:focus-within { border-color: #2a4a6a; }
  textarea.chat-input {
    flex: 1; background: transparent; border: none; outline: none;
    resize: none; font-family: 'Inter', sans-serif;
    font-size: 14px; color: var(--text-1); line-height: 1.5;
    max-height: 120px; min-height: 22px; overflow-y: auto;
  }
  textarea.chat-input::placeholder { color: var(--text-3); }
  .send-btn {
    width: 42px; height: 42px;
    background: #152a42; border: 1px solid #1e3d5c;
    border-radius: 11px; color: #5a9ed4;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: background .2s, border-color .2s, opacity .2s;
    flex-shrink: 0;
  }
  .send-btn:hover:not(:disabled) { background: #1e3d5c; border-color: #2a5078; }
  .send-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* Responsive */
  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr; }
    .chat-area  { padding: 20px 14px; }
    .header     { padding: 12px 16px; }
    .input-area { padding: 12px 14px 16px; }
  }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────── -->
<div class="header">
  <div class="header-logo">🧬</div>
  <div class="header-info">
    <div class="header-title">Reasoning RAG</div>
    <div class="header-sub">BioASQ · Multi-hop Retrieval</div>
  </div>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Online</span>
  </div>
</div>

<!-- ── Chat area ────────────────────────────────────────────────────── -->
<div class="chat-area" id="chatArea">

  <!-- Welcome / empty state -->
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🧬</div>
    <div class="welcome-title">Reasoning RAG</div>
    <div class="welcome-sub">Multi-hop Biomedical Q&amp;A · Ask anything</div>
    <div class="hint-grid">
      <button class="hint-btn" onclick="fillInput(this)">Does the Oncotype DX test work with paraffin embedded tissues?</button>
      <button class="hint-btn" onclick="fillInput(this)">What is the mechanism of action of Trastuzumab (Herceptin)?</button>
      <button class="hint-btn" onclick="fillInput(this)">Which genes are associated with Lynch syndrome?</button>
    </div>
  </div>

  <!-- Message thread (hidden until first message) -->
  <div class="thread" id="thread" style="display:none;"></div>

</div>

<!-- ── Input ─────────────────────────────────────────────────────────── -->
<div class="input-area">
  <div class="input-row">
    <div class="input-wrap">
      <textarea
        class="chat-input"
        id="chatInput"
        rows="1"
        placeholder="Ask a biomedical question…"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)">
      </textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send (Enter)">↑</button>
  </div>
</div>

<!-- ── JavaScript ────────────────────────────────────────────────────── -->
<script>
'use strict';

let msgId   = 0;   // unique counter for each AI card
let busy    = false;

// ── Helpers ────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function now() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function scrollBottom() {
  const ca = document.getElementById('chatArea');
  ca.scrollTo({ top: ca.scrollHeight, behavior: 'smooth' });
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function setBusy(isBusy) {
  busy = isBusy;
  document.getElementById('sendBtn').disabled = isBusy;
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (isBusy) {
    dot.classList.add('busy');
    text.textContent = 'Processing…';
  } else {
    dot.classList.remove('busy');
    text.textContent = 'Online';
  }
}

// ── Welcome hint buttons ────────────────────────────────────────────────
function fillInput(btn) {
  const inp = document.getElementById('chatInput');
  inp.value = btn.textContent.trim();
  autoResize(inp);
  inp.focus();
}

// ── Key handler ─────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ── Show thread, hide welcome ────────────────────────────────────────────
function ensureThread() {
  const welcome = document.getElementById('welcome');
  const thread  = document.getElementById('thread');
  if (welcome.style.display !== 'none') {
    welcome.style.display = 'none';
    thread.style.display  = 'flex';
  }
}

// ── Append user bubble ───────────────────────────────────────────────────
function appendUserBubble(text) {
  ensureThread();
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="user-row">
      <div class="user-bubble">${escHtml(text)}</div>
      <div class="avatar avatar-user">U</div>
    </div>`;
  document.getElementById('thread').appendChild(div.firstElementChild);
  scrollBottom();
}

// ── Append thinking indicator, returns the wrapper element ──────────────
function appendThinking() {
  ensureThread();
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="ai-row" id="thinking-row">
      <div class="avatar avatar-ai">AI</div>
      <div class="ai-card appeared">
        <div class="thinking-wrap">
          <div class="thinking-dot"></div>
          <div class="thinking-dot"></div>
          <div class="thinking-dot"></div>
        </div>
      </div>
    </div>`;
  const node = div.firstElementChild;
  document.getElementById('thread').appendChild(node);
  scrollBottom();
  return node;
}

// ── Remove thinking indicator ────────────────────────────────────────────
function removeThinking() {
  const el = document.getElementById('thinking-row');
  if (el) el.remove();
}

// ── Build stats grid HTML ────────────────────────────────────────────────
function buildStatsGrid(d) {
  const a = d.analysis  || {};
  const s = d.stats     || {};
  const decompVal = (a.needs_decomposition === true || a.needs_decomposition === 'true') ? 'Yes' : 'No';

  return `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-title">Query Analysis</div>
        <div class="stat-row"><span class="stat-k">Complexity</span>   <span class="stat-v">${escHtml(String(a.complexity_score || 0))} · ${escHtml(a.classification || '—')}</span></div>
        <div class="stat-row"><span class="stat-k">Query type</span>   <span class="stat-v">${escHtml(d.metadata?.query_type || '—')}</span></div>
        <div class="stat-row"><span class="stat-k">Depth</span>        <span class="stat-v">${escHtml(a.reasoning_depth || '—')}</span></div>
        <div class="stat-row"><span class="stat-k">Decomposed</span>   <span class="stat-v">${decompVal}</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-title">Retrieval Stats</div>
        <div class="stat-row"><span class="stat-k">Hops</span>              <span class="stat-v">${escHtml(String(s.total_retrievals || 0))}</span></div>
        <div class="stat-row"><span class="stat-k">Successful</span>        <span class="stat-v">${escHtml(String(s.successful || '—'))}</span></div>
        <div class="stat-row"><span class="stat-k">Avg similarity</span>    <span class="stat-v">${escHtml(String(s.avg_similarity || 0))}</span></div>
        <div class="stat-row"><span class="stat-k">Evidence total</span>    <span class="stat-v">${escHtml(String(s.total_evidence || 0))}</span></div>
        <div class="stat-row"><span class="stat-k">High quality</span>      <span class="stat-v">${escHtml(String(s.high_quality_evidence || 0))} / ${escHtml(String(s.total_evidence || 0))}</span></div>
      </div>
    </div>`;
}

// ── Build reasoning path HTML ────────────────────────────────────────────
function buildReasoningPath(path) {
  if (!path || path.length === 0) return '';
  const stepsHtml = path.map((s, i) => {
    const isLast    = i === path.length - 1;
    const connector = isLast ? '' : '<div class="step-connector"></div>';
    return `
      <div class="path-step">
        <div class="step-col">
          <div class="step-node">${escHtml(String(s.step || i + 1))}</div>
          ${connector}
        </div>
        <div class="step-content">
          <div class="step-type">${escHtml(s.type || '')}</div>
          <div class="step-desc">${escHtml(s.desc || '')}</div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="path-card">
      <div class="section-title">Reasoning Path</div>
      <div class="path-steps">${stepsHtml}</div>
    </div>`;
}

// ── Build evidence list HTML ─────────────────────────────────────────────
function buildEvidence(evidence) {
  if (!evidence || evidence.length === 0) return '';
  const itemsHtml = evidence.map(e => `
    <div class="ev-item">
      <div class="ev-meta">
        <span class="ev-rank">#${escHtml(String(e.rank))}</span>
        <span class="tag tag-rel">Relevance ${escHtml(String(e.relevance))}</span>
        <span class="tag tag-sim">Similarity ${escHtml(String(e.similarity))}</span>
        <span class="tag tag-type">${escHtml(e.type || '')}</span>
      </div>
      <div class="ev-text">"${escHtml(e.text || '')}"</div>
    </div>`).join('');

  return `
    <div>
      <div class="section-title" style="margin-bottom:10px;">Top Evidence Sources</div>
      <div class="evidence-list">${itemsHtml}</div>
    </div>`;
}

// ── Build full AI card and append ────────────────────────────────────────
function appendAICard(data) {
  const id   = ++msgId;
  const conf = (data.confidence * 100).toFixed(1);
  const meta = data.metadata || {};
  const s    = data.stats    || {};

  const analysisHtml = `
    <div class="analysis-block">
      <button class="toggle-btn" id="tbtn-${id}" onclick="toggleAnalysis(${id})">
        <span class="toggle-label">Analysis &amp; Sources</span>
        <span class="toggle-chevron" id="tchev-${id}">▼</span>
      </button>
      <div class="analysis-body" id="tbody-${id}">
        ${buildStatsGrid(data)}
        ${buildReasoningPath(data.reasoning_path || [])}
        ${buildEvidence(data.evidence || [])}
      </div>
    </div>`;

  const footerMeta = [
    now(),
    s.total_retrievals ? `${s.total_retrievals} hops` : null,
    meta.integration_method || null,
    meta.total_steps ? `${meta.total_steps} steps` : null,
  ].filter(Boolean).map(v => `<span>${escHtml(v)}</span>`).join('<span>·</span>');

  const wrapper = document.createElement('div');
  wrapper.innerHTML = `
    <div class="ai-row">
      <div class="avatar avatar-ai">AI</div>
      <div style="flex:1;min-width:0;">
        <div class="ai-card appeared">
          <div class="answer-block">
            <div class="answer-meta">
              <span class="answer-label">Answer</span>
              <span class="conf-badge">Confidence ${escHtml(conf)}%</span>
            </div>
            <div class="answer-text">${escHtml(data.answer || '')}</div>
          </div>
          <div class="divider"></div>
          ${analysisHtml}
        </div>
        <div class="msg-footer">${footerMeta}</div>
      </div>
    </div>`;

  document.getElementById('thread').appendChild(wrapper.firstElementChild);
  scrollBottom();
}

// ── Append error card ────────────────────────────────────────────────────
function appendErrorCard(errMsg) {
  const wrapper = document.createElement('div');
  wrapper.innerHTML = `
    <div class="ai-row">
      <div class="avatar avatar-ai">AI</div>
      <div style="flex:1;min-width:0;">
        <div class="ai-card appeared">
          <div class="error-block">
            <div class="error-label">Error</div>
            <div class="error-text">${escHtml(errMsg)}</div>
          </div>
        </div>
        <div class="msg-footer"><span>${now()}</span></div>
      </div>
    </div>`;
  document.getElementById('thread').appendChild(wrapper.firstElementChild);
  scrollBottom();
}

// ── Toggle analysis panel ────────────────────────────────────────────────
function toggleAnalysis(id) {
  const body = document.getElementById(`tbody-${id}`);
  const chev = document.getElementById(`tchev-${id}`);
  body.classList.toggle('show');
  chev.style.transform = body.classList.contains('show') ? 'rotate(180deg)' : '';
}

// ── Main send function ───────────────────────────────────────────────────
async function sendMessage() {
  if (busy) return;

  const inp      = document.getElementById('chatInput');
  const question = inp.value.trim();
  if (!question) return;

  // Clear input
  inp.value = '';
  inp.style.height = 'auto';

  // UI update
  appendUserBubble(question);
  setBusy(true);
  const thinkingEl = appendThinking();

  try {
    const res = await fetch('/api/query', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ question }),
    });

    const json = await res.json();

    removeThinking();

    if (json.ok && json.data) {
      appendAICard(json.data);
    } else {
      appendErrorCard(json.error || `HTTP ${res.status}: unexpected response`);
    }
  } catch (err) {
    removeThinking();
    appendErrorCard(`Network error: ${err.message}`);
  } finally {
    setBusy(false);
    inp.focus();
  }
}
</script>

</body>
